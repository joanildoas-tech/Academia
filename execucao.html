<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execução do Exercício</title>
<link rel="stylesheet" href="static/style.css">
</head>
<body>

<div class="container">

<h1 id="nomeExercicio">Exercício</h1>

<div class="timer">
Tempo total do treino: <span id="timerGeral">00:00</span>
</div>

<div class="cards">

<div class="card">
<label>Repetições:</label>
<input type="number" id="reps" value="10">
</div>

<div class="card">
<label>Carga:</label>
<input type="number" id="peso" value="10"> kg
</div>

<div class="card">
<label>Séries:</label>
<input type="number" id="series" value="3">
</div>

</div>

<h2>Séries</h2>
<div id="seriesContainer" class="series-container"></div>

<div style="text-align:center; margin-bottom:20px;">
<label>Descanso (segundos): </label>
<input type="number" id="descanso" value="60">
<div id="descansoTimer">60s</div>
</div>

<div class="button-container" style="text-align:center;">
<button id="feitoBtn" class="btn-realizado">✔ Realizado</button>
<button id="voltarBtn" class="btn-voltar">🔙 Voltar para treino</button>
</div>

</div>

<script>

/* =========================
LER PARÂMETROS DA URL
========================= */

const urlParams = new URLSearchParams(window.location.search);
const exercicioNome = urlParams.get('exercicio') || "Exercício";
const treino = urlParams.get('treino') || "A";

document.getElementById('nomeExercicio').textContent = exercicioNome;

/* =========================
BOTÃO VOLTAR
========================= */

document.getElementById('voltarBtn').addEventListener('click', () => {
window.location.href = `treino${treino}.html`;
});

/* =========================
TIMER GERAL DO TREINO
========================= */

let savedTime = parseInt(localStorage.getItem('tempoTreino')) || 0;

function atualizarTimerGeral(){

const min = String(Math.floor(savedTime/60)).padStart(2,'0');
const sec = String(savedTime % 60).padStart(2,'0');

document.getElementById('timerGeral').textContent = `${min}:${sec}`;

}

atualizarTimerGeral();

setInterval(()=>{

savedTime++;
localStorage.setItem('tempoTreino', savedTime);
atualizarTimerGeral();

},1000);


/* =========================
INPUTS
========================= */

const repsInput = document.getElementById('reps');
const pesoInput = document.getElementById('peso');
const seriesInput = document.getElementById('series');

const storageKey = `exercicio_${treino}_${exercicioNome.replace(/\s/g,'_')}`;

const savedData = JSON.parse(localStorage.getItem(storageKey)) || {};

if(savedData.reps) repsInput.value = savedData.reps;
if(savedData.peso) pesoInput.value = savedData.peso;
if(savedData.series) seriesInput.value = savedData.series;


/* =========================
SALVAR CONFIGURAÇÕES
========================= */

function salvarConfiguracao(){

const data = {

reps: repsInput.value,
peso: pesoInput.value,
series: seriesInput.value

};

localStorage.setItem(storageKey, JSON.stringify(data));

}

repsInput.addEventListener('input',salvarConfiguracao);
pesoInput.addEventListener('input',salvarConfiguracao);
seriesInput.addEventListener('input',salvarConfiguracao);


/* =========================
SÉRIES
========================= */

const seriesContainer = document.getElementById('seriesContainer');

let currentSerie = parseInt(localStorage.getItem(storageKey+"_serie")) || 0;

function desenharSeries(){

seriesContainer.innerHTML = '';

const totalSeries = Number(seriesInput.value) || 1;

for(let i=0;i<totalSeries;i++){

const div = document.createElement('div');
div.classList.add('serie-box');

if(i < currentSerie){
div.classList.add('done');
}

seriesContainer.appendChild(div);

}

}

desenharSeries();

seriesInput.addEventListener('change',desenharSeries);


/* =========================
BOTÃO REALIZADO
========================= */

let descansoInterval;

document.getElementById('feitoBtn').addEventListener('click',()=>{

const boxes = document.querySelectorAll('.serie-box');

if(currentSerie < boxes.length){

boxes[currentSerie].classList.add('done');

currentSerie++;

localStorage.setItem(storageKey+"_serie", currentSerie);

}

/* reset se terminar */

if(currentSerie >= boxes.length){

localStorage.removeItem(storageKey+"_serie");

}

/* descanso */

if(descansoInterval) clearInterval(descansoInterval);

let restante = Number(document.getElementById('descanso').value) || 60;

document.getElementById('descansoTimer').textContent = `${restante}s`;

descansoInterval = setInterval(()=>{

restante--;

document.getElementById('descansoTimer').textContent = `${restante}s`;

if(restante <= 0){

clearInterval(descansoInterval);

}

},1000);

});

</script>

</body>
</html>

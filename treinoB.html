<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino B</title>
<link rel="stylesheet" href="style.css">
<style>
.container {
    max-width: 600px;
    margin: auto;
}

.cards {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
    align-items: center;
}

.card {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    text-align: center;
    font-weight: bold;
}

.card a {
    text-decoration: none;
    color: #333;
}

.button {
    display: block;
    width: 20%;
    padding: 12px;
    margin-top: 20px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #888;
    color: #fff;
    text-align: center;
    text-decoration: none;
}

.button:hover {
    background: #555;
}
</style>
</head>
<body>
    
<div class="container">
    <h1>Treino B</h1>
        <div style="display: flex;justify-content: center;">
        <label>Tempo total do treino: </label> 
        <div id="timerGeral">00:00</div>
        </div>
    <div class="cards">
        <div class="card"><a href="execucao.html?treino=B&exercicio=Cadeira+Extensora">Cadeira Extensora</a></div>
        <div class="card"><a href="execucao.html?treino=B&exercicio=Leg+Press+Articulado">Leg Press Articulado</a></div>
        <div class="card"><a href="execucao.html?treino=B&exercicio=Cadeira+Flexora">Cadeira Flexora</a></div>
        <div class="card"><a href="execucao.html?treino=B&exercicio=Mesa+Flexora">Mesa Flexora</a></div>
        <div class="card"><a href="execucao.html?treino=B&exercicio=Cadeira+Abdutora">Cadeira Abdutora</a></div>
        <div class="card"><a href="execucao.html?treino=B&exercicio=Panturrilha+Vertical">Panturrilha Vertical</a></div>
        <div class="card"><a href="execucao.html?treino=B&exercicio=Panturrilha+Sentado">Panturrilha Sentado</a></div>
    </div>
    <a href="index.html" class="button">Voltar</a>
</div>
<script>
let savedTime = parseInt(localStorage.getItem('tempoTreino')) || 0;
function atualizarTimerGeral() {
    const min = String(Math.floor(savedTime/60)).padStart(2,'0');
    const sec = String(savedTime%60).padStart(2,'0');
    document.getElementById('timerGeral').textContent = `${min}:${sec}`;
}
atualizarTimerGeral();
setInterval(() => {
    savedTime++;
    localStorage.setItem('tempoTreino', savedTime);
    atualizarTimerGeral();
},1000);
</script>
</body>
</html>
